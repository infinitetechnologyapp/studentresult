<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Results</title>
  <link rel="icon" href="schoolNova.png" type="image/broadsheet-icon" />
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
</head>
<body>

<div class="index-hero">
  <div class="index-card">

    <!-- Logo -->
    <div class="index-logo"><img src="schoolNova2.png" alt="SN" /></div>
    <h2 style="text-align:center;font-size:1.5rem;margin-bottom:4px">SchoolNova</h2>
    <p style="text-align:center;color:var(--text-muted);font-size:.88rem;margin-bottom:28px">
      Building Records that Last Forever
    </p>

    <!-- Student Result Checker -->
    <div class="card mb-4">
      <div class="card-header">
        <h5><i class="bi bi-person-lines-fill" style="color:var(--primary)"></i> Student Record Checker</h5>
      </div>
      <div class="card-body">
        <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:16px">
          Enter your Registration Number to view your result.
        </p>
        <div class="form-group">
          <label class="form-label">Registration Number</label>
          <input type="text" id="studentRegInput" class="form-control"
            placeholder="" style="text-transform:uppercase"/>
        </div>
        <div class="form-group">
          <label class="form-label">Term</label>
          <select id="studentTermInput" class="form-select">
            <option value="">Select Term</option>
            <option value="1">1st Term</option>
            <option value="2">2nd Term</option>
            <option value="3">3rd Term</option>
          </select>
        </div>
        <div id="studentCheckError" class="alert alert-error mb-2 hidden">
          <i class="bi bi-exclamation-circle-fill"></i>
          <span id="studentCheckErrMsg"></span>
        </div>
        <button class="btn btn-primary w-100" id="checkResultBtn" style="width:100%">
          <i class="bi bi-search"></i> View My Records
        </button>
      </div>
    </div>

    <!-- Admin Portal -->
    <!--<a href="admin-login.html" class="portal-card" style="display:flex;flex-direction:row;align-items:center;gap:14px;padding:16px 20px;border:2px solid var(--border);border-radius:var(--radius);text-decoration:none;color:var(--text);transition:all .25s;margin-top:4px">
      <div style="width:44px;height:44px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="bi bi-shield-lock-fill" style="font-size:1.2rem;color:var(--primary)"></i>
      </div>
      <div>
        <div style="font-weight:800;font-size:.9rem">Admin Portal</div>
        <div style="font-size:.75rem;color:var(--text-muted)">For Proprietors, Teachers and Administrators only</div>
      </div>
      <i class="bi bi-chevron-right" style="margin-left:auto;color:var(--text-muted)"></i>
    </a>-->

    <p style="text-align:center;font-size:.72rem;color:var(--text-muted);margin-top:20px">SchoolNova 2026
      &copy; Developed by Brightest Digital Services
    </p>

  </div>
</div>

<script type="module">
import { getStudentByReg, getSession } from "./firebase.js";

const regInput  = document.getElementById("studentRegInput");
const termInput = document.getElementById("studentTermInput");
const errBox    = document.getElementById("studentCheckError");
const errMsg    = document.getElementById("studentCheckErrMsg");
const checkBtn  = document.getElementById("checkResultBtn");

// Auto-select current term set by admin
getSession().then(s => {
  if (s.currentTerm) termInput.value = s.currentTerm;
}).catch(() => {});

function showErr(msg) {
  errMsg.textContent = msg;
  errBox.classList.remove("hidden");
  errBox.style.animation = "none";
  requestAnimationFrame(() => errBox.style.animation = "shake .4s ease");
}

checkBtn.addEventListener("click", async () => {
  errBox.classList.add("hidden");
  const reg  = regInput.value.trim().toUpperCase();
  const term = termInput.value;
  if (!reg)  { showErr("Please enter your registration number."); return; }
  if (!term) { showErr("Please select a term."); return; }

  checkBtn.disabled = true;
  checkBtn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px"></span> Checking…';

  try {
    const student = await getStudentByReg(reg);
    if (!student) { showErr("Registration number not found. Please check and try again."); return; }
    // Navigate to student result page
    window.location.href = `student.html?reg=${encodeURIComponent(reg)}&term=${term}`;
  } catch(e) {
    showErr("Could not connect. Please try again.");
    console.error(e);
  } finally {
    checkBtn.disabled = false;
    checkBtn.innerHTML = '<i class="bi bi-search"></i> View My Result';
  }
});

regInput.addEventListener("keydown", e => { if (e.key === "Enter") checkBtn.click(); });
</script>
</body>
</html>
